<!DOCTYPE html>
<html data-variant="B" lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>GitPulse — регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/analytics.css}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

        .reg-root {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7f5f0;
            padding: 32px 16px;
        }

        .reg-card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e8e3d9;
            padding: 40px 36px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .reg-logo {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 32px;
        }

        .reg-logo-text {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #16150f;
        }

        .reg-heading {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #16150f;
            margin-bottom: 6px;
        }

        .reg-sub {
            font-size: 13px;
            color: #8a8573;
            margin-bottom: 28px;
        }

        .reg-field { margin-bottom: 16px; }

        .reg-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #5a5648;
            margin-bottom: 5px;
        }

        .reg-input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e8e3d9;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #16150f;
            background: #fafaf8;
            outline: none;
            transition: border-color 0.15s;
        }

        .reg-input:focus { border-color: oklch(0.42 0.19 275); background: #fff; }
        .reg-input::placeholder { color: #c5c0b4; }

        .reg-btn {
            width: 100%;
            padding: 13px 20px;
            background: oklch(0.42 0.19 275);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 6px;
            margin-bottom: 16px;
            transition: filter 0.15s;
            box-shadow: 0 1px 2px oklch(0.42 0.19 275 / 0.25), 0 4px 12px oklch(0.42 0.19 275 / 0.18);
        }

        .reg-btn:hover { filter: brightness(1.1); }

        .reg-error {
            margin-bottom: 16px;
            padding: 10px 14px;
            background: oklch(0.55 0.22 28 / 0.08);
            border: 1px solid oklch(0.55 0.22 28 / 0.2);
            border-radius: 8px;
            font-size: 13px;
            color: oklch(0.55 0.22 28);
        }

        .reg-hint { font-size: 12px; color: #8a8573; text-align: center; }
        .reg-hint a { color: oklch(0.42 0.19 275); font-weight: 500; text-decoration: none; }
    </style>
</head>
<body>

<div class="reg-root">
    <div class="reg-card">

        <div class="reg-logo">
            <svg fill="none" height="22" viewBox="0 0 22 22" width="22">
                <defs>
                    <linearGradient id="lg-reg" x1="0" x2="1" y1="0" y2="1">
                        <stop offset="0" stop-color="oklch(0.42 0.19 275)"/>
                        <stop offset="1" stop-color="oklch(0.58 0.15 275)"/>
                    </linearGradient>
                </defs>
                <path d="M11 1 L21 8 L17 21 L5 21 L1 8 Z" fill="url(#lg-reg)"/>
                <path d="M11 1 L17 21 L11 14 L5 21 Z" fill="rgba(0,0,0,0.12)"/>
            </svg>
            <span class="reg-logo-text">GitPulse</span>
        </div>

        <h2 class="reg-heading">Создать аккаунт</h2>
        <p class="reg-sub">Настройка займёт 5 минут.</p>

        <div class="reg-error" th:if="${error}" th:text="${error}">Ошибка</div>

        <form action="/register" method="post" th:action="@{/register}">
            <input th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" type="hidden"/>

            <div class="reg-field">
                <label class="reg-label" for="name">Имя</label>
                <input autocomplete="name" class="reg-input" id="name"
                       name="name" placeholder="Иван Иванов" required
                       th:value="${name}" type="text"/>
            </div>

            <div class="reg-field">
                <label class="reg-label" for="email">Email</label>
                <input autocomplete="email" class="reg-input" id="email"
                       name="email" placeholder="you@company.com" required
                       th:value="${email}" type="email"/>
            </div>

            <div class="reg-field">
                <label class="reg-label" for="password">Пароль</label>
                <input autocomplete="new-password" class="reg-input" id="password"
                       minlength="8" name="password" placeholder="Минимум 8 символов"
                       required type="password"/>
            </div>

            <button class="reg-btn" type="submit">Зарегистрироваться</button>
        </form>

        <p class="reg-hint">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </p>

    </div>
</div>

</body>
</html>
