<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>GitLab Analytics — Создание workspace</title>
    <link rel="stylesheet" th:href="@{/css/analytics.css}">
</head>
<body class="login-page">

<div class="login-card">

    <div class="login-icon">
        <svg fill="none" viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M282.83 170.73l-.27-.69-26.14-68.22a6.81 6.81 0 00-2.69-3.24 7 7 0 00-8 .43 7 7 0 00-2.32 3.52l-17.65 54H154.29l-17.65-54a6.86 6.86 0 00-2.32-3.52 7 7 0 00-8-.43 6.85 6.85 0 00-2.69 3.24L97.44 170l-.26.69a48.54 48.54 0 0016.1 56.1l.09.07.24.17 39.82 29.82 19.7 14.91 12 9.06a8.07 8.07 0 009.76 0l12-9.06 19.7-14.91 40.06-30 .1-.08a48.56 48.56 0 0016.08-56.04z"
                fill="#FC6D26"/>
            <path d="M282.83 170.73l-.27-.69a88.3 88.3 0 00-35.15 19.33L190 239.11c19.55 14.79 36.57 27.64 36.57 27.64l40.06-30 .1-.08a48.56 48.56 0 0016.1-56.04z"
                  fill="#E24329"/>
            <path d="M153.43 266.75l19.7 14.91 12 9.06a8.07 8.07 0 009.76 0l12-9.06 19.7-14.91S209.55 254 190 239.11c-19.55 14.79-36.57 27.64-36.57 27.64z"
                  fill="#FCA326"/>
            <path d="M132.58 189.37A88.19 88.19 0 0097.44 170l-.26.69a48.54 48.54 0 0016.1 56.1l.09.07.24.17 39.82 29.82S170.45 254 190 239.11z"
                  fill="#E24329"/>
        </svg>
    </div>

    <h1>Добро пожаловать, <span th:text="${login}">user</span>!</h1>
    <p class="login-subtitle">Создайте workspace для вашей команды — это займёт несколько секунд</p>

    <form method="post" th:action="@{/onboarding}" style="width:100%;margin-top:1.5rem;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input
            type="text"
            name="workspaceName"
            placeholder="Название команды (например, Backend Team)"
            required
            maxlength="255"
            style="width:100%;padding:.75rem 1rem;font-size:1rem;border:1px solid #d0d7de;border-radius:8px;box-sizing:border-box;margin-bottom:1rem;outline:none;"
        />
        <button
            type="submit"
            class="btn-oauth btn-github"
            style="width:100%;justify-content:center;">
            Создать workspace
        </button>
    </form>

</div>

</body>
</html>
