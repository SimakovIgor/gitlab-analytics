<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>GitPulse — Ошибка</title>
    <link rel="stylesheet" th:href="@{/css/analytics.css}">
</head>
<body class="app-layout" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
<div style="text-align:center;max-width:440px;padding:2rem;">
    <div style="font-size:56px;font-weight:800;color:var(--color-text-muted,#9ca3af);line-height:1;margin-bottom:0.5rem;"
         th:text="${status}">500</div>
    <div class="page-title" style="margin-bottom:0.5rem;"
         th:text="${status == 403} ? 'Доступ запрещён'
                 : (${status == 404} ? 'Страница не найдена'
                 : (${status == 503} ? 'Сервис недоступен'
                 : 'Что-то пошло не так'))">Что-то пошло не так</div>
    <div class="page-subtitle" style="margin-bottom:1.5rem;"
         th:text="${status == 403} ? 'У вас нет доступа к этой странице. Попробуйте войти заново.'
                 : (${status == 404} ? 'Страница не существует или была удалена.'
                 : 'Попробуйте обновить страницу или вернитесь назад.')">
        Попробуйте обновить страницу или вернитесь назад.
    </div>
    <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
        <a class="btn-secondary" href="javascript:history.back()"
           style="display:inline-block;text-decoration:none;">← Назад</a>
        <a class="btn-primary" href="/login"
           style="display:inline-block;text-decoration:none;">Войти</a>
    </div>
</div>
</body>
</html>
