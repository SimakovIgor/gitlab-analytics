<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>GitPulse — восстановление пароля</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/analytics.css}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'Inter', -apple-system, system-ui, sans-serif; }
        .root { min-height: 100vh; display: flex; align-items: center; justify-content: center;
                background: #f7f5f0; padding: 32px 16px; }
        .card { width: 100%; max-width: 400px; background: #fff; border-radius: 16px;
                border: 1px solid #e8e3d9; padding: 40px 36px;
                box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        .logo { display: flex; align-items: center; gap: 9px; margin-bottom: 32px; }
        .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: #16150f; }
        .heading { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: #16150f; margin-bottom: 6px; }
        .sub { font-size: 13px; color: #8a8573; margin-bottom: 24px; line-height: 1.5; }
        .field { margin-bottom: 16px; }
        .label { display: block; font-size: 12px; font-weight: 600; color: #5a5648; margin-bottom: 5px; }
        .input { width: 100%; padding: 11px 14px; border: 1.5px solid #e8e3d9; border-radius: 8px;
                 font-size: 14px; font-family: 'Inter', sans-serif; color: #16150f; background: #fafaf8;
                 outline: none; transition: border-color 0.15s; }
        .input:focus { border-color: oklch(0.42 0.19 275); background: #fff; }
        .btn { width: 100%; padding: 13px 20px; background: oklch(0.42 0.19 275); color: #fff;
               border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
               font-family: 'Inter', sans-serif; cursor: pointer; margin-top: 6px; margin-bottom: 16px;
               transition: filter 0.15s; }
        .btn:hover { filter: brightness(1.1); }
        .success { margin-bottom: 16px; padding: 12px 14px; background: #f0fdf4;
                   border: 1px solid #bbf7d0; border-radius: 8px; font-size: 13px; color: #15803d; }
        .hint { font-size: 12px; color: #8a8573; text-align: center; }
        .hint a { color: oklch(0.42 0.19 275); font-weight: 500; text-decoration: none; }
    </style>
</head>
<body>
<div class="root">
    <div class="card">

        <div class="logo">
            <svg fill="none" height="22" viewBox="0 0 22 22" width="22">
                <defs>
                    <linearGradient id="lg" x1="0" x2="1" y1="0" y2="1">
                        <stop offset="0" stop-color="oklch(0.42 0.19 275)"/>
                        <stop offset="1" stop-color="oklch(0.58 0.15 275)"/>
                    </linearGradient>
                </defs>
                <path d="M11 1 L21 8 L17 21 L5 21 L1 8 Z" fill="url(#lg)"/>
                <path d="M11 1 L17 21 L11 14 L5 21 Z" fill="rgba(0,0,0,0.12)"/>
            </svg>
            <span class="logo-text">GitPulse</span>
        </div>

        <h2 class="heading">Забыли пароль?</h2>
        <p class="sub">Введите email — пришлём ссылку для сброса пароля.</p>

        <div class="success" th:if="${sent}">
            Если аккаунт с таким email существует, ссылка отправлена. Проверьте почту.
        </div>

        <form action="/forgot-password" method="post" th:action="@{/forgot-password}" th:if="${!sent}">
            <div class="field">
                <label class="label" for="email">Email</label>
                <input autocomplete="email" class="input" id="email"
                       name="email" placeholder="you@company.com" required type="email"/>
            </div>
            <button class="btn" type="submit">Отправить ссылку</button>
        </form>

        <p class="hint"><a href="/login">← Вернуться ко входу</a></p>
    </div>
</div>
</body>
</html>
