<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>GitPulse — Ошибка приглашения</title>
    <link rel="stylesheet" th:href="@{/css/analytics.css}">
</head>
<body class="app-layout" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
<div style="text-align:center;max-width:400px;padding:2rem;">
    <div style="font-size:2.5rem;margin-bottom:1rem;">🔗</div>
    <div class="page-title" style="margin-bottom:0.5rem;">Ссылка недействительна</div>
    <div class="page-subtitle" th:text="${error}">Приглашение устарело или уже использовано.</div>
    <a class="btn-primary" href="/login" style="display:inline-block;margin-top:1.5rem;text-decoration:none;">Войти</a>
</div>
</body>
</html>
