spring:
  application:
    name: gitlab-analytics

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gitlab_analytics}
    username: ${DB_USERNAME:analytics}
    password: ${DB_PASSWORD:analytics}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  encryption:
    # Шифрование токенов GitLab в базе данных.
    # false — токены хранятся в открытом виде (NoOpEncryptionService).
    # Для production установить true и предоставить реальный бин EncryptionService.
    enabled: false

  gitlab:
    # Таймаут установки соединения с GitLab API (секунды)
    connect-timeout-seconds: 10
    # Таймаут ожидания ответа от GitLab API (секунды).
    # Увеличить при работе с медленными инстансами GitLab.
    read-timeout-seconds: 120
    # Количество повторных попыток при временных ошибках сети
    max-retries: 3
    # Размер страницы при пагинации GitLab API (max 100)
    per-page: 100

  snapshot:
    # Cron-расписание автоматического снапшота метрик (UTC).
    # Формат: сек мин час день месяц день_недели
    cron: "0 0 2 * * *"
    # Скользящее окно расчёта метрик по умолчанию (дней).
    # Используется, если в запросе не передан параметр windowDays.
    window-days: 30

  sync:
    # Cron-расписание автоматической ночной синхронизации с GitLab (UTC).
    # Запускается после снапшота (в 3:00, снапшот в 2:00).
    cron: "0 0 3 * * *"
    # Глубина синхронизации — сколько дней назад захватывать MR.
    # 2 дня — чтобы не пропустить MR, смерджённые около полуночи.
    window-days: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    enable:
      jvm: true
      process: true
      system: true
      hikaricp: true
      logback: true
      http: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
        http.client.requests: 100ms,500ms,1s,2s,5s,10s

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    io.simakov.analytics: INFO
    org.flywaydb: INFO
