spring:
  application:
    name: gitlab-analytics

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gitlab_analytics}
    username: ${DB_USERNAME:analytics}
    password: ${DB_PASSWORD:analytics}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  security:
    # Override with API_TOKEN env variable in production
    api-token: ${API_TOKEN:changeme-in-production}
  encryption:
    # WARNING: NoOpEncryptionService stores tokens as plaintext.
    # Set to true and provide a real EncryptionService bean for production.
    enabled: false
  gitlab:
    connect-timeout-seconds: 10
    read-timeout-seconds: 30
    max-retries: 3
  snapshot:
    # Daily at 02:00 UTC. Set to '-' to disable.
    cron: "0 0 2 * * *"
    window-days: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    io.simakov.analytics: INFO
    org.flywaydb: INFO
