spring:
  application:
    name: gitlab-analytics

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gitlab_analytics}
    username: ${DB_USERNAME:analytics}
    password: ${DB_PASSWORD:analytics}
    hikari:
      # mrProcessingExecutor (5) + snapshotExecutor (2) + Tomcat HTTP threads + headroom
      maximum-pool-size: 15
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  encryption:
    # Шифрование токенов GitLab в базе данных (AES-256-GCM).
    # false — токены хранятся в открытом виде (NoOpEncryptionService).
    # true  — активирует AesEncryptionService; требует непустого ключа в ENCRYPTION_KEY.
    enabled: false
    # 256-битный ключ в base64 (32 байта). Генерация: openssl rand -base64 32
    # Игнорируется, если enabled=false.
    key: ${ENCRYPTION_KEY:}

  gitlab:
    # Таймаут установки соединения с GitLab API (секунды)
    connect-timeout-seconds: 10
    # Таймаут одного HTTP-запроса к GitLab API (секунды, Netty ReadTimeoutHandler).
    # Увеличить при работе с медленными инстансами GitLab.
    read-timeout-seconds: 120
    # Количество повторных попыток при временных ошибках (429, 5xx)
    max-retries: 5
    # Начальный backoff между retry-попытками (секунды, exponential с jitter)
    retry-backoff-seconds: 5
    # Потолок backoff — экспонента не растёт выше этого значения (секунды).
    # Без ограничения: 5s→10s→20s→40s→80s — суммарно >150s при 5 ретраях.
    max-backoff-seconds: 30
    # Таймаут на всю операцию включая все ретраи (секунды).
    # Должен быть >= max-retries * max-backoff-seconds + запас на сами запросы.
    # 5 ретраев × 30s + 60s запас = 210s → берём 300s.
    block-timeout-seconds: 300
    # Размер страницы при пагинации GitLab API (max 100)
    per-page: 100

  snapshot:
    # Cron-расписание автоматического снапшота метрик (UTC).
    # Формат: сек мин час день месяц день_недели
    # Запускается после синка (в 3:00, синк в 2:00).
    cron: "0 0 3 * * *"
    # Скользящее окно расчёта метрик по умолчанию (дней).
    # Используется, если в запросе не передан параметр windowDays.
    window-days: 30

  sync:
    # Cron-расписание автоматической ночной синхронизации с GitLab (UTC).
    # Запускается первым (в 2:00), снапшот следом в 3:00.
    cron: "0 0 2 * * *"
    # Глубина синхронизации — сколько дней назад захватывать MR.
    # 2 дня — чтобы не пропустить MR, смерджённые около полуночи.
    window-days: 2

  jira:
    # URL Jira-инстанса (Cloud или Server). Пусто = интеграция отключена.
    base-url: ${JIRA_BASE_URL:}
    # Email (Cloud) или username (Server) для Basic-аутентификации
    username: ${JIRA_USERNAME:}
    # API-токен (Cloud) или пароль (Server)
    api-token: ${JIRA_API_TOKEN:}
    # Ключ Jira-проекта с инцидентами
    project-key: ${JIRA_PROJECT_KEY:MI}
    # Таймаут HTTP-запросов к Jira (секунды)
    read-timeout-seconds: 30
    # Максимальное количество инцидентов за один синк
    max-results: 5000
    # ID кастомного поля Jira "Start of Impact" (для расчёта MTTR)
    impact-start-field-id: ${JIRA_IMPACT_START_FIELD:customfield_13901}
    # ID кастомного поля Jira "End of Impact" (для расчёта MTTR)
    impact-end-field-id: ${JIRA_IMPACT_END_FIELD:customfield_13902}

  insights:
    thresholds:
      # Часов с момента создания MR, после которых он считается зависшим (STUCK_MRS)
      stuck-mr-hours: 24
      # Командная медиана TTM выше этого значения (часов) → HIGH_MERGE_TIME
      max-median-ttm-hours: 24.0
      # Рост медианы TTM относительно прошлого периода → MERGE_TIME_SPIKE (2.0 = вырос в 2+ раза)
      merge-time-spike-ratio: 2.0
      # Коэффициент Джини распределения ревью выше этого → REVIEW_LOAD_IMBALANCE
      review-gini: 0.45
      # Средний размер MR (строк) выше этого → LARGE_MR_HABIT
      large-mr-lines: 500
      # Доля текущих MR от прошлого периода ниже этого → DELIVERY_DROP (0.70 = упало до менее 70%)
      delivery-drop-ratio: 0.70
      # Среднее комментариев на отревьюенный MR ниже этого → LOW_REVIEW_DEPTH
      min-comments-per-mr: 1.5
      # Доля доработок выше этого → HIGH_REWORK_RATIO
      max-rework-ratio: 0.35
      # Минимальный порог смерджённых MR для проверки отсутствия ревью → NO_CODE_REVIEW
      min-mrs-for-no-review-check: 5
      # DORA Lead Time for Changes (дней) выше этого → SLOW_LEAD_TIME (7 = граница High/Medium)
      max-lead-time-days: 7.0
      # DORA Deploy Frequency (деплоев/день) ниже этого → LOW_DEPLOY_FREQUENCY (1/7 ≈ раз в неделю)
      min-deploys-per-day: 0.143
      # Рост DORA Lead Time относительно прошлого периода → LEAD_TIME_REGRESSION (1.5 = вырос на 50%+)
      lead-time-regression-ratio: 1.5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    enable:
      jvm: true
      process: true
      system: true
      hikaricp: true
      logback: true
      http: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
        http.client.requests: 100ms,500ms,1s,2s,5s,10s

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    io.simakov.analytics: INFO
    org.flywaydb: INFO
