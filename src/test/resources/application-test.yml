spring:
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-github-client-id
            client-secret: test-github-client-secret

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

app:
  encryption:
    enabled: false
  gitlab:
    connect-timeout-seconds: 5
    read-timeout-seconds: 10
    max-retries: 1
  jira:
    base-url: ""
    username: ""
    api-token: ""
    project-key: MI
    read-timeout-seconds: 10
    max-results: 100
    impact-start-field-id: customfield_10400
    impact-end-field-id: customfield_10401
  snapshot:
    cron: "-"
    window-days: 30
