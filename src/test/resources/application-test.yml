spring:
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-github-client-id
            client-secret: test-github-client-secret

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

app:
  security:
    api-token: test-token
  encryption:
    enabled: false
  gitlab:
    connect-timeout-seconds: 5
    read-timeout-seconds: 10
    max-retries: 1
  snapshot:
    cron: "-"
    window-days: 30
