global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: [ "node-exporter:9100" ]

  - job_name: gitlab-analytics
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "app:8080" ]
    relabel_configs:
      - target_label: application
        replacement: gitlab-analytics
    metric_relabel_configs:
      - source_labels: [ uri ]
        regex: '([^?]+)\?.*'
        target_label: uri
        replacement: '${1}'
      - source_labels: [ uri ]
        regex: '(/api/v4/[^/]+)/([0-9]+)(.*)'
        target_label: uri
        replacement: '${1}/:id${3}'
      - source_labels: [ uri ]
        regex: '(/api/v4/[^/]+/:id/[^/]+)/([0-9]+)(.*)'
        target_label: uri
        replacement: '${1}/:id${3}'
      - source_labels: [ uri ]
        regex: '(.*)/([0-9a-f]{7,40})$'
        target_label: uri
        replacement: '${1}/:sha'
