name: gitlab-analytics

services:
  postgres:
    image: postgres:16-alpine
    container_name: gitlab-analytics-postgres
    environment:
      POSTGRES_DB: gitlab_analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U analytics -d gitlab_analytics" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gitlab-analytics-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gitlab_analytics
      DB_USERNAME: analytics
      DB_PASSWORD: analytics
      API_TOKEN: ${API_TOKEN:-changeme-dev-only}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
